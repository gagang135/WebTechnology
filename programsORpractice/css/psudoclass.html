<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psudo Classes</title>
    <style>
        a:link{
            color: brown;
            background-color: aqua;
        }

        a:visited{
         color: rebeccapurple;
            background-color: aquamarine;   
        }
        a:hover{
            color: yellowgreen;
            background-color: black;
        }
        a:active{
            color: white;
            background-color: hotpink;
        }
    </style>
</head>
<body>
    <h1>Dynamic psudo classes</h1>
    <hr size="5" color="red">
    <a href="https://www.instagram.com">InstaGram</a>
</body>
</html>
