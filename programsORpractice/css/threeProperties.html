<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three main Properties</title>

<style>

    #parent{
        height: 600px;
        width: 800px;
        background-color: aqua;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #child1{
        height: 200px;
        width: 200px;
        background-color: orange;
        border: 1px solid black;
    }
#child2{
        height: 200px;
        width: 200px;
        background-color: white;
        border: 1px solid black;
    }
#child3{
        height: 200px;
        width: 200px;
        background-color: greenyellow;
        border: 1px solid black;
    }

</style>
</head>
<body>
    <div id="parent">
        <div id="child1">item1</div>
        <div id="child2">item2</div>
        <div id="child3">item3</div>
    </div>
</body>
</html>
